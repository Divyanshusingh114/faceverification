services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      AUDIT_LOG_PATH: /var/log/aadhaar-verify/audit.log
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/readyz').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s
    volumes:
      - audit_logs:/var/log/aadhaar-verify
    restart: unless-stopped

volumes:
  audit_logs:
